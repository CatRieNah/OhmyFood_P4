<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohmyfood</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Shrikhand&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/2fda15efa0.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="assets/CSS/styles.css">
</head>
<body>
    <header>
        <h1>
            <img src="assets/Images et textes Ohmyfood/images/logo/ohmyfood@2x.svg" alt="logo">
        </h1>
    </header>
    <main>
        <section>
            <div class="location">
                <span>
                    <i class="fa-solid fa-location-dot"></i>
                </span>
                <button>
                    Paris,Belleville
                </button>
            </div>
           <div class="intro">
            <h2 class="section-title">
                Réservez le menu qui <br>vous convient
            </h2>
            <p>
                Découvrez des restaurants d’exception,<br>sélectionnés par nos soins.
            </p>
            <a href="#restaurants">
                <button>
                    Explorer nos restaurants
                </button>
            </a>
           </div>
        </section>
        <section class="function">
            <h2 class="section-title">
                Fonctionnement
            </h2>
            <ol>
                <li>
                    <span>
                        <i class="fa-solid fa-mobile-screen"></i>
                    </span>
                    <h3>
                        Choisissez un restaurant
                    </h3>
                </li>
                <li>
                    <span>
                        <i class="fa-solid fa-list"></i>
                    </span>
                    <h3>
                        Composez votre menu
                    </h3>
                </li>
                <li>
                    <span>
                        <i class="fa-solid fa-store"></i>
                    </span>
                    <h3>
                        Dégustez au restaurant
                    </h3>
                </li>
            </ol>
        </section>
        <section id="restaurants">
            <h2 class="section-title">
                Restaurants
            </h2>
            <div class="container-card">
                <a href="#">
                    <article class="card">
                        <div class="card-content">
                            <div class="card-image">
                                <img src="assets/Images et textes Ohmyfood/images/restaurants/jay-wennington-N_Y88TWmGwA-unsplash.jpg" alt="Menu du restaurant">
                                <button>Nouveau</button>
                            </div>
                            <div class="card-text">
                                <h3 class="title-menu">
                                    La palette du gout
                                </h3>
                                <p>Ménilmontant</p>
                                <span>
                                    <i class="fa-solid fa-heart"></i>
                                </span>
                            </div>
                        </div>
                    </article>
                </a>
            </div>
        </section>
    </main>
</body>
</html>
